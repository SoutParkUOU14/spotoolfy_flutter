name: Flutter Build APK

# 触发条件：当你提交代码到 main 分支，或者在 GitHub 网页上手动点击运行
on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改成 master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Java 环境 (Android 打包必需)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 配置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # flutter-version: '3.19.0' # 如果你有特定版本要求，可以解开这行

      # 4. 获取项目依赖
      - name: Install dependencies
        run: |
          flutter pub add material_color_utilities:^0.13.0   # 👈 强行插入这一行，自动解决版本冲突
          flutter pub get

      # 5. 获取项目依赖
      - name: Install dependencies
        run: |
          flutter pub add material_color_utilities:^0.13.0
          flutter pub get

      # 🔄 升级这一步：自动修复环境兼容性 + 剔除缺失的本地化配置
      - name: Fix Flutter SDK Compatibility
        run: |
          # 1. 强行在 main.dart 第一行插入缺少的 cupertino 库导入
          sed -i '1s/^/import "package:flutter\/cupertino.dart";\n/' lib/main.dart
          # 2. 擦除 main.dart 中错误的 const 关键字
          sed -i 's/const CupertinoPageTransitionsBuilder/CupertinoPageTransitionsBuilder/g' lib/main.dart
          # 3. ➕ 强行删掉 AndroidManifest 中找不到的多语言配置属性
          sed -i 's/android:localeConfig="@xml\/locale_config"//g' android/app/src/main/AndroidManifest.xml

      # 6. 执行打包命令
      - name: Build APK
        run: flutter build apk --split-per-abi --target-platform android-arm64

      # 6. 将打包好的 APK 孤立出来，方便用户下载
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotoolfy-local-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
